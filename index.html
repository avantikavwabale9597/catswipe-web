<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CATSWIPE 🐾</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html">CatTinder</a>
      <a href="cards.html">🎴 Cat cards <span id="likeCount">0</span></a>
      <a href="daily.html">🌤️ Daily Cat</a>
    </nav>
    <header>
      <h1>🐱 CatSwipe</h1>
    </header>

    <main>
      <div class="card-container">
        <div class="swipe-card" id="catCard">
          <img id="catImage" />
          <h2 id="breedName">Loading...</h2>
        </div>
      </div>
      <div class="cat-fact" id="catFact">Loading cat facts ...</div>
      <div class="actions">
        <button id="dislike">❌</button>
        <button id="like">❤️</button>
        <button onclick="undoSwipe()">↩️</button>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/swipe.js"></script>
    <script>
      function updateLikeCount() {
        const cards = JSON.parse(localStorage.getItem("catCards")) || [];
        const el = document.getElementById("likeCount");
        if (el) el.innerText = cards.length;
      }

      updateLikeCount();
    </script>
  </body>
</html>
