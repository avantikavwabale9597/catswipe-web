<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Daily Cat 🌤️</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav class="nav">
      <button onclick="toggleDark()">🌙</button>
      <a href="index.html">CatTinder</a>
      <a href="cards.html">🎴 Cat Cards <span id="likeCount">0</span></a>
      <a href="daily.html">🌤️ Daily Cat</a>
      <a href="match.html">❤️ Match Finder</a>
    </nav>

    <h2>🌤️ Cat of the Day</h2>

    <div class="daily-container">
      <div class="daily-card">
        <img id="dailyImg" />
        <h3 id="dailyName"></h3>
        <p id="dailyFact"></p>
      </div>
    </div>

    <h3>😺 You might also like</h3>

    <div class="cards-container" id="recommendations"></div>

    <script src="js/daily.js"></script>
    <script>
      function updateLikeCount() {
        const cards = JSON.parse(localStorage.getItem("catCards")) || [];
        const el = document.getElementById("likeCount");
        if (el) el.innerText = cards.length;
      }

      updateLikeCount();
    </script>
    <script src="js/theme.js"></script>
  </body>
</html>
